<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Stutzen — сгенерированный фид</title>
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_simple.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 12px 16px; color: #222; }
    h1 { margin: 0 0 8px; font-size: 18px; }
    .nav { font-size: 13px; margin-bottom: 8px; }
    .nav a { color: #06c; text-decoration: none; margin-right: 12px; }
    .nav a.active { color: #222; font-weight: bold; text-decoration: underline; }
    .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .bar input, .bar select, .bar button { padding: 6px 10px; font-size: 14px; }
    .bar input[type=text] { width: 260px; }
    button { background: #ffcc00; border: none; cursor: pointer; border-radius: 4px; }
    button:disabled { background: #ddd; cursor: wait; }
    .meta { font-size: 13px; color: #555; }
    .meta b { color: #222; }
    .meta a { color: #06c; text-decoration: none; }
    .meta a:hover { text-decoration: underline; }
    #table { height: calc(100vh - 180px); }
    .thumb { width: 40px; height: 40px; object-fit: contain; }
    .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; }
    .badge.yes { background: #d4edda; color: #155724; }
    .badge.no { background: #f8d7da; color: #721c24; }
    .empty { color: #999; padding: 24px 0; text-align: center; }

    .tabulator .tabulator-header,
    .tabulator .tabulator-header-contents,
    .tabulator .tabulator-headers { height: auto !important; }
    .tabulator .tabulator-header .tabulator-col,
    .tabulator .tabulator-header .tabulator-col .tabulator-col-content,
    .tabulator .tabulator-header .tabulator-col-resize-handle {
      height: auto !important;
      min-height: 56px;
    }
    .tabulator .tabulator-header .tabulator-col .tabulator-col-title-holder,
    .tabulator .tabulator-header .tabulator-col .tabulator-col-title {
      white-space: normal !important;
      overflow: visible !important;
      line-height: 1.2;
    }
    .tabulator .tabulator-header .tabulator-col .tabulator-col-content { padding: 6px 8px; }
  </style>
</head>
<body>
  <h1>Сгенерированный фид для Я.Маркета</h1>
  <div class="nav">
    <a href="/">Я.Маркет</a>
    <a href="/supplier.html">Поставщик</a>
    <a href="/markup.html">Наценка</a>
    <a href="/price-sync.html">Сверка и отправка цен</a>
    <a href="/sales.html">Продажи</a>
    <a href="/cancellations.html">Отмены</a>
    <a href="/feed-logs.html">Логи фидов</a>
    <a href="/feed-view.html" class="active">Смотреть фид</a>
  </div>

  <div class="meta" id="meta">Загружаю…</div>

  <div class="bar">
    <input id="search" type="text" placeholder="поиск по SKU / артикулу / названию / бренду">
    <select id="category"><option value="">Все категории ЯМ</option></select>
    <select id="availability">
      <option value="">В наличии: любое</option>
      <option value="yes">Только доступные</option>
      <option value="no">Только недоступные</option>
    </select>
    <button id="refresh">Обновить</button>
    <button id="regen">↻ Пересобрать фид</button>
    <a href="/api/ym/price-feed.xml" target="_blank" style="margin-left:auto;font-size:13px;color:#06c;">Открыть XML →</a>
  </div>

  <div id="table"></div>

  <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
  <script src="/feed-view.js"></script>
</body>
</html>
