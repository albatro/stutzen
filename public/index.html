<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Stutzen — товары Я.Маркет</title>
  <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator_simple.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 12px 16px; color: #222; }
    h1 { margin: 0 0 8px; font-size: 18px; }
    .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
    .bar input, .bar select, .bar button { padding: 6px 10px; font-size: 14px; }
    .bar input[type=text] { width: 260px; }
    button { background: #ffcc00; border: none; cursor: pointer; border-radius: 4px; }
    button:disabled { background: #ddd; cursor: wait; }
    .stats { font-size: 13px; color: #555; }
    #table { height: calc(100vh - 130px); }
    .thumb { width: 40px; height: 40px; object-fit: contain; }

    .tabulator .tabulator-header,
    .tabulator .tabulator-header-contents,
    .tabulator .tabulator-headers { height: auto !important; }

    .tabulator .tabulator-header .tabulator-col,
    .tabulator .tabulator-header .tabulator-col .tabulator-col-content,
    .tabulator .tabulator-header .tabulator-col-resize-handle {
      height: auto !important;
      min-height: 56px;
    }

    .tabulator .tabulator-header .tabulator-col .tabulator-col-title-holder,
    .tabulator .tabulator-header .tabulator-col .tabulator-col-title {
      white-space: normal !important;
      overflow: visible !important;
      text-overflow: clip !important;
      line-height: 1.2;
      word-break: normal;
    }

    .tabulator .tabulator-header .tabulator-col .tabulator-col-content {
      padding: 6px 8px;
    }

    .gear-wrap { position: relative; display: inline-block; }
    .gear-btn {
      background: #f0f0f0;
      padding: 6px 10px;
      font-size: 16px;
      line-height: 1;
    }
    .gear-panel {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 4px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      padding: 8px 12px;
      z-index: 100;
      max-height: 70vh;
      overflow-y: auto;
      min-width: 240px;
    }
    .gear-panel.open { display: block; }
    .gear-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }
    .gear-panel .gear-actions {
      display: flex;
      gap: 8px;
      border-top: 1px solid #eee;
      padding-top: 8px;
      margin-top: 6px;
    }
    .gear-panel .gear-actions button {
      background: #f0f0f0;
      font-size: 12px;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <h1>Товары Я.Маркет</h1>
  <div style="font-size:13px;margin-bottom:8px;">
    <a href="/" style="color:#222;font-weight:bold;text-decoration:underline;margin-right:12px;">Я.Маркет</a>
    <a href="/supplier.html" style="color:#06c;text-decoration:none;margin-right:12px;">Поставщик</a>
    <a href="/markup.html" style="color:#06c;text-decoration:none;margin-right:12px;">Наценка</a>
    <a href="/price-sync.html" style="color:#06c;text-decoration:none;margin-right:12px;">Сверка цен</a>
    <a href="/sales.html" style="color:#06c;text-decoration:none;margin-right:12px;">Продажи</a>
    <a href="/cancellations.html" style="color:#06c;text-decoration:none;margin-right:12px;">Отмены</a>
    <a href="/feed-logs.html" style="color:#06c;text-decoration:none;margin-right:12px;">Логи фидов</a>
    <a href="/feed-view.html" style="color:#06c;text-decoration:none;margin-right:12px;">Смотреть фид</a>
    <a href="/supplier-feed.html" style="color:#06c;text-decoration:none;">Входящий фид</a>
  </div>
  <div class="bar">
    <input id="search" type="text" placeholder="поиск по SKU / названию">
    <select id="category"><option value="">Все категории</option></select>
    <button id="refresh">Обновить таблицу</button>
    <button id="sync">Запустить синхронизацию ЯМ</button>
    <span class="gear-wrap">
      <button class="gear-btn" id="gear" title="Колонки">⚙</button>
      <div class="gear-panel" id="gearPanel"></div>
    </span>
    <span class="stats" id="stats">…</span>
  </div>
  <div id="table"></div>

  <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
